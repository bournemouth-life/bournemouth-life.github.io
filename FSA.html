# Freedom of Speech in Higher Education Activism
A Christian who has an autism diagnosis cannot attend support groups held on a HE campus in Bournemouth after seeking support for a Chinese student who had disclosed suicidal thoughts. The HE institution alleged that he may be sharing his view of the benifits of the Christian faith with Chinese students and staff and has required him to stay off campus where he had attended an autism support group run by DAAS. Prior to this, he was denied access to an exercise referral program prescribed by his GP to treat autism related anxiety. During his visit to the leisure centre he had made contact with a visiting academic from Beijing Normal University whose husband works for the Chinese Communist Party (CCP).

## Malicious abuse of Confidential Autism Diagnosis report.
Prior to the bans at each location the autistic Christian had provided a psychiatric report in confidence to the relevant organsisations. Based on the information provided in the report, organisations including Dorset Police had sought to criminalise quiet and non-disruptive presence. Dorset Police, having lost a case in February/March 2023, wasted significant sums of public money to protect the HE institution. Their evidence was based on a poorly written news article found online and connected with information they had misused from the confidential psychiatric report.

## Activism
It is worth noting that neither the HE institution or the Leisure Centre banned this person due to his autism. A letter from the HE institution dated 18th November 2022 clearly states the reason as sharing the views of the benifits of the Christian faith to Chinese Staff and Students. This is a Freedon of Speech violation.

### Quiet, non-disruptive presence and prayer
This will be acheived using a hoodie with branding of the HE institution and a Jesus flag in the main part. Both items carry the Chinese characters '神是愛'. PA systems will not be used at this stage and will be a quiet, non-disruptive presence. These events will consist mainly of prayer and people are welcome to make prayer requests.

### 神是愛
'神是愛' are the Chinese characters meaning 'God is Love'. This is the phrase used on items used for campaigning.

### Staff safety and Wellbeing
More information will be provided through contact with Unison. This is a shared concern of both this campiagn and a director of the Leisure Centre. Staff are welcome to request prayer where they see the Jesus flag or '神是愛'.

## Response from Authorities

From past experience of other activism it is known that rogues in authority often try to criminalise peaceful activism. So far there are none in connection with this campaign since its luanch on Sunday 22nd March 2026. Any official contact will be noted in the relevant sections below.

### Section 35 notices

#### 27th March 2026: Campus Police Officer
A Dorset Police officer assigned to the HE campus met informally with the autistic Christian at an off-campus location during a 'Stop the Boats' protest. Although informal, the offcier allowed him to record the conversation and the officer also recorded on his BWV. The conversation was to confirm if the autistic Christian had received a more recent banning letter from the HE institution since the letter issued on 18th November 2022. Further email dialogue with the campus officer will be focused around allowing access to the autism support group run by DAAS and protecting that meeeting from being cancelled by the HE institution.

#### 15th April 2026: Asked not to wear hoodie.
The autistic Christian had been informed of an event by a supportive staff member of the HE Institution. He stood just outside campus wearing the '神是愛' hoodie and holding the Jesus flag. An officer from Dorset Police arrived and asked the autistic Christian to not wear the hoodie as it could cause confusion. The autistic Christian explained that He had first used the hoodie to deter slander as it bore the branding of the HE Institution slandering Him. This had the required deterrent effect. However, the autistic Christian removed the hoodie as asked. The officer recorded on his BWV and the Christian also recorded. The HE Instsitution was emailed explaining the deterrence of slander and that the hoodie would be retained for future deterrence if necessary.

## Response from the HE Institution

### Malicious allegations

#### 29th March 2026: Probable HE agent at Leisure Centre
An informant at the Leisure Centre heard a complaint made to reception 'He is harassing people in the car park'. At this point the autistic Christian was not holding the flag but was wearing the '神是愛' hoodie. He was promoting the 5 steps to wellbeing after collecting a leaflet on this from the Student Union of the HE Institution. It is likely that the complainant was an agent of HE Institution. The Leisure Centre has been informed so that CCTV can be retained. The autistic Christian had not entered any building at the Leisure Centre.

#### 6th April 2026: False allegations made by HE staff.
A staff member of the HE Institution slandered the autistic Christian linking the slander to previous recorded abuse that BCP Council and Dorset Police already hold. The autistic Christian was then threatened with violence from an unknown individual who appeared after the staff member had made a phone call. This has been captured by CCTV. After making the call the staff member sat in his car, registration recorded.

#### 10th April 2026: Physical assult by HE staff.
A staff member of the HE Institution physically assulted the autistic Christian attempting to take his phone. An audio recording has been made and the name of the offender recorded. The victim sucessfully de-escalated the situation with the help of another staff member.

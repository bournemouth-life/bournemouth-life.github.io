# Freedom of Speech in Higher Education Activism
A Christian who has an autism diagnosis cannot attend support groups held on a HE campus in Bournemouth after seeking support for a Chinese student who had disclosed suicidal thoughts. The HE institution alleged that he may be sharing his view of the benifits of the Christian faith with Chinese students and staff and has required him to stay off campus where he had attended an autism support group run by DAAS. Prior to this, he was denied access to an exercise referral program prescribed by his GP to treat autism related anxiety. During his visit to the leisure centre he had made contact with a visiting academic from Beijing Normal University whose husband works for the Chinese Communist Party (CCP).

## Activism
It is worth noting that neither the HE institution or the Leisure Centre banned this person due to his autism. A letter from the HE institution dated 18th November 2022 clearly states the reason as sharing the views of the benifits of the Christian faith to Chinese Staff and Students. This is a Freedon of Speech violation.

### Quiet, non-disruptive presence and prayer
This will be acheived using a hoodie with branding of the HE institution and a Jesus flag in the main part. Both items carry the Chinese characters '神是愛'. PA systems will not be used at this stage and will be a quiet, non-disruptive presence. These events will consist mainly of prayer and people are welcome to make prayer requests.

### 神是愛
'神是愛' are the Chinese characters meaning 'God is Love'. This is the phrase used on items used for campaigning.

## Response from Authorities
